openapi: "3.0.0"
info:
  title: Quest Regression API
  version: "1.0.0"

paths: {}

components:
  schemas:
    Quest:
      type: object
      required: [tags, steps]
      properties:
        tags:
          type: array
          items:
            type: string
        steps:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/CombatStep'
              - $ref: '#/components/schemas/DialogueStep'
            discriminator:
              propertyName: type
              mapping:
                combat: '#/components/schemas/CombatStep'
                dialogue: DialogueStep

    Step:
      type: object
      required: [type]
      properties:
        type:
          type: string
      discriminator:
        propertyName: type
        mapping:
          combat: '#/components/schemas/CombatStep'
          dialogue: DialogueStep

    CombatStep:
      allOf:
        - $ref: '#/components/schemas/Step'
        - type: object
          required: [target]
          properties:
            target:
              type: string

    DialogueStep:
      allOf:
        - $ref: '#/components/schemas/Step'
        - type: object
          required: [npc]
          properties:
            npc:
              type: string

    EffectCarrier:
      type: object
      required: [effect]
      properties:
        effect:
          $ref: '#/components/schemas/DialogueEffect'

    DialogueEffect:
      allOf:
        - $ref: '#/components/schemas/EffectDetails'
        - $ref: '#/components/schemas/EffectExtra'

    EffectDetails:
      allOf:
        - $ref: '#/components/schemas/BaseEffect'
        - type: object
          properties:
            flag:
              type: string
            value:
              type: integer

    EffectExtra:
      allOf:
        - type: object
          properties:
            npc:
              type: string
            faction:
              type: string

    BaseEffect:
      type: object
      required: [type]
      properties:
        type:
          type: string
