openapi: "3.0.0"
info:
  title: Dialogue Regression API
  version: "1.0.0"

paths: {}

components:
  schemas:
    DialogueChoice:
      type: object
      properties:
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/DialogueCondition'

    DialogueCondition:
      discriminator:
        propertyName: type
        mapping:
          has_flag: '#/components/schemas/FlagDialogueCondition'
          quest_state: QuestStateDialogueCondition

    FlagDialogueCondition:
      allOf:
        - $ref: '#/components/schemas/DialogueCondition'
        - type: object
          required: [type, flag]
          properties:
            type:
              type: string
            flag:
              type: string

    QuestStateDialogueCondition:
      allOf:
        - $ref: '#/components/schemas/DialogueCondition'
        - type: object
          required: [type, quest_id]
          properties:
            type:
              type: string
            quest_id:
              type: string

    DialogueEffect:
      type: object
      required: [type]
      properties:
        type:
          type: string
      discriminator:
        propertyName: type
        mapping:
          set_flag: '#/components/schemas/SetFlagEffect'
          add_relationship: AddRelationshipEffect

    SetFlagEffect:
      allOf:
        - $ref: '#/components/schemas/DialogueEffect'
        - type: object
          required: [type, flag, value]
          properties:
            flag:
              type: string
            value:
              type: boolean

    AddRelationshipEffect:
      allOf:
        - $ref: '#/components/schemas/DialogueEffect'
        - type: object
          required: [type, npc, value]
          properties:
            npc:
              type: string
            faction:
              type: string
            value:
              type: integer
